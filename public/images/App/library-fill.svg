<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="120" height="120">
  <defs>
    <mask id="book-cutout">
      <rect width="24" height="24" fill="white" />
      
      <line x1="4" y1="8" x2="9" y2="8" stroke="black" stroke-width="1.5" stroke-linecap="round" />
      <line x1="4" y1="17" x2="9" y2="17" stroke="black" stroke-width="1.5" stroke-linecap="round" />
      
      <g transform="rotate(-10 15 -1)">
        <line x1="13" y1="8" x2="18" y2="8" stroke="black" stroke-width="1.5" stroke-linecap="round" />
        <line x1="13" y1="17" x2="18" y2="17" stroke="black" stroke-width="1.5" stroke-linecap="round" />
      </g>
    </mask>
  </defs>

  <g fill="#1F2E4D" mask="url(#book-cutout)">
    <rect x="4" y="4" width="5" height="17" rx="1.5" />
    
    <rect x="10" y="8" width="4" height="13" rx="1.5" />
    
    <g transform="rotate(-10 15 -1)">
      <rect x="13" y="4" width="5" height="17" rx="1.5" />
    </g>
  </g>
</svg>
